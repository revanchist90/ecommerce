services:
  postgres:
    image: postgres:15
    container_name: order-db-dev
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order-user
      POSTGRES_PASSWORD: order-pass
    ports:
      - "5432:5432"
    volumes:
      - order-db-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order-user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  order-db-dev-data:
